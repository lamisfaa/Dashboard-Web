services:
  backend:
    image: lamisfaa/dashboard-web-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FRONTEND_URL: http://localhost:5173
      GOOGLE_REDIRECT_URI: http://127.0.0.1:8000/api/auth/google/callback
      USER_DB_PATH: /app/backend/data/users.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/backend/data
      - ./src/data.json:/app/src/data.json

  frontend:
    image: lamisfaa/dashboard-web-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend-data:
