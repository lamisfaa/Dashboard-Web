services:
  - type: web
    name: dashboard-web-backend
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile.backend
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: dashboard-data
      mountPath: /app/backend/data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FULL_NAME
        value: Dashboard Admin
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: USER_DB_PATH
        value: /app/backend/data/users.db
      - key: DASHBOARD_DATA_DIR
        value: /app/backend/data
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
